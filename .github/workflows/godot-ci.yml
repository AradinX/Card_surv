name: Godot CI

on:
  push:
    branches:
      - main
    tags: 
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Testy Godot
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GODOT_VERSION: "4.5.1"

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Zainstaluj Godota
        shell: bash
        run: |
          set -euo pipefail

          curl -L \
            -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"

          unzip godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$RUNNER_TEMP/godot"

          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Sprawdź wersję Godota
        run: godot --version

      - name: Zaimportuj projekt
        run: godot --headless --path . --import

      - name: Uruchom testy i wygeneruj raport
        shell: bash
        run: |
          set -euo pipefail

          tests=(
            smoke_test.gd
            fog_of_war_test.gd
            season_test.gd
            board_test.gd
            load_test.gd
            ui_layout_test.gd
            night_pool_test.gd
            save_load_test.gd
            meta_progression_test.gd
            audio_test.gd
            card_upgrade_test.gd
            hand_draw_test.gd
            biome_camp_test.gd
            bum_preparation_test.gd
          )

          commit_name="$(git log -1 --pretty=%s)"
          commit_sha="$(git rev-parse --short HEAD)"
          commit_author="$(git log -1 --pretty=%an)"

          passed=0
          failed=0

          {
            echo "# Raport testów Godot"
            echo ""
            echo "- **Commit:** \`$commit_sha\` — $commit_name"
            echo "- **Autor:** $commit_author"
            echo "- **Branch:** \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "| Test | Wynik |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for test in "${tests[@]}"; do
            echo "::group::$test"

            if timeout 120 godot --headless --path . -s "tests/$test"; then
              echo "| \`$test\` | ✅ Zielony |" >> "$GITHUB_STEP_SUMMARY"
              passed=$((passed + 1))
            else
              echo "| \`$test\` | ❌ Czerwony |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error title=Test nie przeszedł::$test"
              failed=$((failed + 1))
            fi

            echo "::endgroup::"
          done

          {
            echo ""
            echo "## Podsumowanie"
            echo ""
            echo "- ✅ Zaliczone: **$passed**"
            echo "- ❌ Niezaliczone: **$failed**"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

  build-windows:
    name: Build Windows
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GODOT_VERSION: "4.5.1"

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Zainstaluj Godota
        shell: bash
        run: |
          set -euo pipefail

          curl -L \
            -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"

          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$RUNNER_TEMP/godot"

          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Zainstaluj szablony eksportu
        shell: bash
        run: |
          set -euo pipefail

          curl -L \
            -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"

          mkdir -p "$RUNNER_TEMP/export-templates"
          unzip -q templates.tpz -d "$RUNNER_TEMP/export-templates"

          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$template_dir"

          cp -r "$RUNNER_TEMP/export-templates/templates/." "$template_dir/"

      - name: Zaimportuj projekt
        run: godot --headless --path . --import

      - name: Zbuduj wersję Windows
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p build/windows

          godot --headless \
            --path . \
            --export-release Windows \
            build/windows/Dzien50.exe

          test -f build/windows/Dzien50.exe
          test -f build/windows/Dzien50.pck

      - name: Wyślij gotową grę
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: Dzien50-Windows-${{ github.sha }}
          path: build/windows/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Dodaj build do raportu
        shell: bash
        run: |
          {
            echo "## Build Windows"
            echo ""
            echo "- ✅ Eksport zakończony"
            echo "- **Commit:** \`${GITHUB_SHA::7}\`"
            echo "- **Artifact:** [Pobierz Dzien50-Windows](${{ steps.upload.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: GitHub Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Pobierz build Windows
        uses: actions/download-artifact@v8
        with:
          name: Dzien50-Windows-${{ github.sha }}
          path: release-files

      - name: Spakuj wersję Windows
        shell: bash
        run: |
          set -euo pipefail

          cd release-files
          zip -r "../Dzien50-Windows-${GITHUB_REF_NAME}.zip" .
          cd ..

          test -f "Dzien50-Windows-${GITHUB_REF_NAME}.zip"

      - name: Utwórz GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "Dzien50-Windows-${GITHUB_REF_NAME}.zip" \
            --verify-tag \
            --generate-notes \
            --title "Dzień 50 ${GITHUB_REF_NAME}"

      - name: Dodaj release do raportu
        shell: bash
        run: |
          {
            echo "## GitHub Release"
            echo ""
            echo "- ✅ Opublikowano **${GITHUB_REF_NAME}**"
            echo "- [Otwórz wydanie](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME})"
          } >> "$GITHUB_STEP_SUMMARY"