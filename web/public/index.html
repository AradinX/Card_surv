<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Dzień 50</title>
<link rel="icon" href="./assets/favicon.webp">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#10131a}
canvas{display:block;touch-action:none}
#dev{position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;display:none;z-index:9}
</style>
</head>
<body>
<canvas id="c"></canvas><div id="dev"></div>
<script type="module">
import { STR, fmt } from "./strings.js";
// The platform consumes root logic.js itself (rules mode) and does not
// serve it statically — the client imports its verbatim copy from assets/.
import * as L from "./assets/rules.js";

// --- assets ---
const IMG = {};
const ASSETS = {
	forest: "./assets/biome_forest.webp",
	meadows: "./assets/biome_meadows.webp",
	mountains: "./assets/biome_mountains.webp",
	forest_cor: "./assets/biome_forest_cor.webp",
	meadows_cor: "./assets/biome_meadows_cor.webp",
	mountains_cor: "./assets/biome_mountains_cor.webp",
	bg: "./assets/bg_main.webp",
	bum: "./assets/bum_splash.webp",
};
let assetsLeft = Object.keys(ASSETS).length;
for (const [k, src] of Object.entries(ASSETS)) {
	IMG[k] = new Image();
	IMG[k].onload = IMG[k].onerror = () => { assetsLeft--; };
	IMG[k].src = src;
}

// --- palette (from the STYLE FORMULA roles) ---
const COL = {
	bgDark: "#10131a", panel: "#1b222b", panelLine: "#3a2f26",
	parchment: "#e8d5a8", parchDim: "#9b8d6e", amber: "#d9a85c",
	green: "#5a7a52", teal: "#4e6e6a", grey: "#5d6770",
	acid: "#7CFC2E", red: "#c75450", blue: "#5e8fb5",
	hp: "#c75450", hunger: "#d9a85c", thirst: "#5e8fb5", warmth: "#d97a3c", energy: "#8fbf6a",
	disabled: "rgba(10,12,16,0.62)",
};

// --- engine state (the client is the local engine driver for this solo game) ---
let st = null;        // full state (engine)
let view = null;      // viewFor(st) — what we render
let screen = "menu";  // menu | play | end
let overlay = null;   // null | "reward" | "pick" | "bum" | "tile"
let toast = null, toastT = 0;
let shakeT = 0;
let lastLogLen = 0;

function newGame() {
	st = L.setup(["solo"], (Math.random() * 4294967296) >>> 0);
	view = L.viewFor(st, "solo");
	screen = "play"; overlay = null; lastLogLen = st.log.length; shakeT = 0;
	syncOverlays();
}
function doAction(a) {
	if (!st || st.over && a.type !== "none") { /* end screen handles restart */ }
	const v = L.validateAction(st, "solo", a);
	if (!v.ok) { toast = STR.errors[v.error] || STR.errors.invalid; toastT = 120; return; }
	st = L.applyAction(st, "solo", a);
	view = L.viewFor(st, "solo");
	for (let i = lastLogLen; i < st.log.length; i++) {
		if (st.log[i].t === "bum") { overlay = "bum"; shakeT = 50; }
	}
	lastLogLen = st.log.length;
	syncOverlays();
	if (st.over && overlay !== "bum") screen = "end";
}
function syncOverlays() {
	if (overlay === "bum") return;
	if (st.cardChoices) overlay = "pick";
	else if (st.pending > 0) overlay = "reward";
	else if (overlay === "reward" || overlay === "pick") overlay = null;
}

// --- canvas / virtual resolution ---
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const DPR_CAP = 1.5;
let VW = 1280, VH = 720, scaleF = 1, offX = 0, offY = 0, portrait = false;
function resize() {
	const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
	canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr;
	canvas.style.width = innerWidth + "px"; canvas.style.height = innerHeight + "px";
	ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
	portrait = innerHeight > innerWidth;
	VW = portrait ? 720 : 1280; VH = portrait ? 1280 : 720;
	scaleF = Math.min(innerWidth / VW, innerHeight / VH);
	offX = (innerWidth - VW * scaleF) / 2; offY = (innerHeight - VH * scaleF) / 2;
}
addEventListener("resize", resize); addEventListener("orientationchange", resize); resize();

// --- draw helpers (drawOps feeds the dev overlay) ---
let drawOps = 0;
function rect(x, y, w, h, fill, line) {
	ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); drawOps++;
	if (line) { ctx.strokeStyle = line; ctx.lineWidth = 2; ctx.strokeRect(x + 1, y + 1, w - 2, h - 2); drawOps++; }
}
function text(s, x, y, size, col, align = "left", bold = true) {
	ctx.fillStyle = col; ctx.textAlign = align; ctx.textBaseline = "top";
	ctx.font = (bold ? "bold " : "") + size + "px 'Segoe UI', system-ui, sans-serif";
	ctx.fillText(s, x, y); drawOps++;
}
function wrapText(s, x, y, w, size, col, lineH, maxLines = 9) {
	ctx.font = "bold " + size + "px 'Segoe UI', system-ui, sans-serif";
	const words = String(s).split(" ");
	let line = "", lines = 0;
	for (const word of words) {
		const probe = line ? line + " " + word : word;
		if (ctx.measureText(probe).width > w && line) {
			text(line, x, y + lines * lineH, size, col); lines++;
			if (lines >= maxLines) return lines;
			line = word;
		} else line = probe;
	}
	if (line) { text(line, x, y + lines * lineH, size, col); lines++; }
	return lines;
}
function img(key, x, y, w, h) {
	const im = IMG[key];
	if (im && im.complete && im.naturalWidth > 0) {
		ctx.imageSmoothingEnabled = false;
		ctx.drawImage(im, x, y, w, h); drawOps++;
	} else rect(x, y, w, h, COL.panel);
}
function bar(x, y, w, h, val, max, col, label) {
	rect(x, y, w, h, "#0c0f14", COL.panelLine);
	rect(x + 2, y + 2, Math.max(0, (w - 4) * Math.min(val / max, 1)), h - 4, col);
	text(label + " " + val + "/" + max, x + 6, y + h / 2 - 8, 14, COL.parchment);
}

// --- hit testing ---
let hits = [];
function hit(x, y, w, h, fn) { hits.push({ x, y, w, h, fn }); }
canvas.addEventListener("pointerdown", (e) => {
	const vx = (e.clientX - offX) / scaleF, vy = (e.clientY - offY) / scaleF;
	for (let i = hits.length - 1; i >= 0; i--) {
		const r = hits[i];
		if (vx >= r.x && vx <= r.x + r.w && vy >= r.y && vy <= r.y + r.h) { r.fn(); return; }
	}
});
addEventListener("keydown", (e) => {
	if ((screen === "menu" || screen === "end") && (e.code === "Enter" || e.code === "Space")) {
		e.preventDefault(); newGame(); return;
	}
	if (screen !== "play" || overlay) {
		if (e.code === "Escape" && overlay === "tile") overlay = null;
		return;
	}
	if (e.code === "Space") { e.preventDefault(); doAction({ type: "endDay" }); }
	const m = /^Digit([1-7])$/.exec(e.code);
	if (m) doAction({ type: "play", index: Number(m[1]) - 1 });
});

// --- log formatting (structured entries -> Polish text) ---
function cardName(id) { return (STR.cards[id] || { n: id }).n; }
function evName(id) { return (STR.events[id] || { n: id }).n; }
function fmtLog(e) {
	const Lg = STR.log;
	switch (e.t) {
		case "day": return fmt(Lg.day, e.d);
		case "play": return fmt(Lg.play, cardName(e.c));
		case "gather": return fmt(Lg.gather, cardName(e.c));
		case "build": return fmt(Lg.build, cardName(e.c), e.n, e.max);
		case "move": return fmt(Lg.move, e.cor ? STR.biomes[e.b].c : STR.biomes[e.b].n);
		case "event": return fmt(Lg.event, evName(e.e), (STR.events[e.e] || { d: "" }).d) + (e.sheltered ? " · " + Lg.shelter : "");
		case "monster": return e.hit ? fmt(Lg.monster, evName(e.e), e.dp, cardName(e.hit.c), e.hit.dmg) : fmt(Lg.monsterNoBld, evName(e.e), e.dp);
		case "eat": return fmt(Lg.eat, e.v);
		case "drink": return fmt(Lg.drink, e.v);
		case "starve": return Lg.starve;
		case "dehydrate": return Lg.dehydrate;
		case "freeze": return Lg.freeze;
		case "tools": return Lg.tools;
		case "drawTwo": return Lg.drawTwo;
		case "explore": return Lg["explore" + e.roll];
		case "levelup": return fmt(Lg.levelup, e.lvl);
		case "rewardEnergy": return fmt(Lg.rewardEnergy, e.v);
		case "rewardHealth": return fmt(Lg.rewardHealth, e.v);
		case "rewardCard": return fmt(Lg.rewardCard, cardName(e.c));
		case "sign": return STR.signs[e.i];
		case "bum": return Lg.bum;
		case "bumDmg": return fmt(Lg.bumDmg, cardName(e.c), e.pct + "%" + (e.ruin ? " · " + STR.ui.ruin : ""));
		case "repair": return fmt(Lg.repair, cardName(e.c));
		case "dismantle": return fmt(Lg.dismantle, cardName(e.c), e.w, e.m);
		case "win": return Lg.win;
		case "lose": return Lg.lose;
		default: return "";
	}
}

// --- card drawing ---
function costLine(id) {
	const c = L.CARDS[id];
	const parts = [];
	parts.push("⚡" + (c.e + (c.t === "b" ? L.C.BUILD_ENERGY_DELTA : 0)));
	if (c.costF) parts.push("🍖" + c.costF);
	if (c.costW) parts.push("🪵" + c.costW);
	if (c.costM) parts.push("⚙" + c.costM);
	return parts.join("  ");
}
function drawCard(id, x, y, w, h, blocked, onTap, extra) {
	const isB = L.CARDS[id].t === "b";
	rect(x, y, w, h, isB ? "#242b22" : COL.panel, blocked ? "#444" : COL.amber);
	text(cardName(id), x + 8, y + 8, 15, COL.parchment);
	text(costLine(id), x + 8, y + 30, 14, COL.amber);
	wrapText((STR.cards[id] || { d: "" }).d, x + 8, y + 52, w - 16, 12, COL.parchDim, 15, 4);
	if (extra) text(extra, x + 8, y + h - 22, 12, COL.acid);
	if (blocked) {
		rect(x, y, w, h, COL.disabled);
		wrapText(blocked, x + 8, y + h - 40, w - 16, 11, "#d99", 13, 2);
	} else if (onTap) hit(x, y, w, h, onTap);
}

// --- screens ---
function drawMenu() {
	img("bg", 0, 0, VW, VH);
	rect(0, 0, VW, VH, "rgba(8,10,14,0.45)");
	const cx = VW / 2;
	text(STR.ui.title, cx, VH * 0.16, portrait ? 72 : 88, COL.parchment, "center");
	text(STR.ui.subtitle, cx, VH * 0.16 + (portrait ? 84 : 102), 22, COL.amber, "center");
	const introY = VH * 0.42;
	[STR.ui.intro1, STR.ui.intro2, STR.ui.intro3].forEach((s, i) =>
		text(s, cx, introY + i * 30, 18, i === 2 ? COL.acid : COL.parchment, "center"));
	const bw = 280, bh = 70, bx = cx - bw / 2, by = VH * 0.66;
	rect(bx, by, bw, bh, "#2c3a28", COL.acid);
	text(STR.ui.start, cx, by + 20, 26, COL.parchment, "center");
	hit(bx, by, bw, bh, newGame);
	text(STR.ui.keysHint, cx, VH - 40, 14, COL.parchDim, "center");
}

function drawEnd() {
	img("bg", 0, 0, VW, VH);
	rect(0, 0, VW, VH, "rgba(8,10,14,0.6)");
	const cx = VW / 2;
	const won = st.won;
	text(won ? STR.ui.winTitle : STR.ui.loseTitle, cx, VH * 0.2, 64, won ? COL.acid : COL.red, "center");
	const msg = won ? STR.ui.winText : STR.ui.loseText + " " + st.day + ".";
	msg.split("\n").forEach((s, i) => text(s, cx, VH * 0.42 + i * 30, 20, COL.parchment, "center"));
	text(STR.ui.level + " " + st.level + " · " + STR.ui.day + " " + st.day + "/" + L.C.WIN_DAY, cx, VH * 0.56, 18, COL.amber, "center");
	const bw = 300, bh = 70, bx = cx - bw / 2, by = VH * 0.68;
	rect(bx, by, bw, bh, "#2c3a28", COL.acid);
	text(STR.ui.again, cx, by + 20, 24, COL.parchment, "center");
	hit(bx, by, bw, bh, newGame);
}

function layout() {
	if (!portrait) return {
		topH: 84, boardX: 16, boardY: 96, tileW: 200, tileH: 148, gap: 6,
		logX: 650, logY: 96, logW: 614, logH: 300,
		gatherX: 650, gatherY: 404, gatherW: 614, gatherH: 140, gcW: 144, gcH: 132,
		handX: 16, handY: 552, hcW: 150, hcH: 152, handCols: 7,
		endX: 1112, endY: 560, endW: 152, endH: 140,
		resY: 60,
	};
	return {
		topH: 128, boardX: 8, boardY: 138, tileW: 232, tileH: 142, gap: 4,
		logX: 8, logY: 584, logW: 704, logH: 130,
		gatherX: 8, gatherY: 446, gatherW: 704, gatherH: 130, gcW: 168, gcH: 126,
		handX: 8, handY: 748, hcW: 168, hcH: 148, handCols: 4,
		endX: 8, endY: 1068, endW: 704, endH: 60,
		resY: 100,
	};
}

function drawTop(Ly) {
	rect(0, 0, VW, Ly.topH, "rgba(12,15,20,0.92)");
	const actLabel = st.act === 2 ? STR.ui.act2 : STR.ui.act1;
	text(STR.ui.day + " " + st.day + "/" + L.C.WIN_DAY, 12, 8, 22, COL.parchment);
	text(actLabel, 12, 36, 13, st.act === 2 ? COL.acid : COL.parchDim);
	const lvlX = portrait ? VW - 200 : 190;
	text(STR.ui.level + " " + st.level + "  ·  XP " + st.xp + "/" + L.xpCost(st.level) + (st.pending > 0 ? "  ★" + st.pending : ""), lvlX, 8, 15, COL.amber, portrait ? "left" : "left");
	const bw = portrait ? 136 : 150, bh = 24, by = portrait ? 38 : 8;
	const bx0 = portrait ? 12 : 360;
	const bars = [
		[st.hp, st.maxHp, COL.hp, STR.ui.hp],
		[st.hunger, 10, COL.hunger, STR.ui.hunger],
		[st.thirst, 10, COL.thirst, STR.ui.thirst],
		[st.warmth, 10, COL.warmth, STR.ui.warmth],
		[st.energy, st.maxEnergy, COL.energy, STR.ui.energy],
	];
	bars.forEach(([v, m, col, lab], i) => {
		const x = portrait ? bx0 + (i % 3) * (bw + 8) : bx0 + i * (bw + 8);
		const y = portrait ? by + Math.floor(i / 3) * (bh + 4) : by;
		bar(x, y, bw, bh, v, m, col, lab);
	});
	const res = STR.ui.food + ": " + st.food + "   " + STR.ui.water + ": " + st.water + "   " +
		STR.ui.wood + ": " + st.wood + "   " + STR.ui.materials + ": " + st.materials + "   " +
		STR.ui.tools + ": " + (st.tools ? STR.ui.yes : STR.ui.no);
	text(res, 12, Ly.resY, 14, COL.parchDim);
}

function drawBoard(Ly) {
	for (let i = 0; i < L.C.BOARD; i++) {
		const col = i % 3, row = Math.floor(i / 3);
		const x = Ly.boardX + col * (Ly.tileW + Ly.gap);
		const y = Ly.boardY + row * (Ly.tileH + Ly.gap);
		const tile = st.board[i];
		img(tile.b + (tile.cor ? "_cor" : ""), x, y, Ly.tileW, Ly.tileH);
		rect(x, y, Ly.tileW, 44, "rgba(10,12,16,0.66)");
		const bn = tile.cor ? STR.biomes[tile.b].c : STR.biomes[tile.b].n;
		text((i === st.pos ? "▶ " : "") + bn, x + 6, y + 4, 15, i === st.pos ? COL.amber : COL.parchment);
		text(STR.ui.slots + " " + tile.blds.length + "/" + L.BIOMES[tile.b].slots, x + 6, y + 24, 12, COL.parchDim);
		// building chips
		tile.blds.forEach((b, bi) => {
			const chipW = Ly.tileW / 2 - 8, chipH = 20;
			const cx2 = x + 4 + (bi % 2) * (chipW + 4), cy2 = y + Ly.tileH - 4 - (Math.floor(bi / 2) + 1) * (chipH + 3);
			rect(cx2, cy2, chipW, chipH, b.ruin ? "#3a1f1f" : "rgba(20,26,20,0.85)", b.ruin ? COL.red : COL.green);
			text((b.ruin ? STR.ui.ruin + " " : "") + cardName(b.id) + " " + b.hp + "♥", cx2 + 4, cy2 + 3, 11, b.ruin ? "#d99" : COL.parchment);
		});
		const movable = !L.moveBlockReason(st, i);
		if (movable) {
			rect(x, y, Ly.tileW, Ly.tileH, "rgba(140,200,120,0.10)");
			ctx.strokeStyle = COL.energy; ctx.lineWidth = 3; ctx.strokeRect(x + 2, y + 2, Ly.tileW - 4, Ly.tileH - 4); drawOps++;
			hit(x, y, Ly.tileW, Ly.tileH, () => doAction({ type: "move", tile: i }));
		} else if (i === st.pos) {
			ctx.strokeStyle = COL.amber; ctx.lineWidth = 3; ctx.strokeRect(x + 2, y + 2, Ly.tileW - 4, Ly.tileH - 4); drawOps++;
			if (tile.blds.length > 0) hit(x, y, Ly.tileW, Ly.tileH, () => { overlay = "tile"; });
		}
	}
}

function drawLog(Ly) {
	rect(Ly.logX, Ly.logY, Ly.logW, Ly.logH, "rgba(14,17,22,0.9)", COL.panelLine);
	const lineH = 17, maxLines = Math.floor((Ly.logH - 16) / lineH);
	const entries = st.log.slice(-maxLines);
	entries.forEach((e, i) => {
		const s = fmtLog(e);
		const colr = e.t === "day" ? COL.amber : (e.t === "bum" || e.t === "monster" || e.t === "sign") ? COL.acid :
			(e.t === "starve" || e.t === "dehydrate" || e.t === "freeze" || e.t === "lose") ? "#d99" : COL.parchDim;
		text(s, Ly.logX + 10, Ly.logY + 8 + i * lineH, 13, colr, "left", false);
	});
}

function drawGather(Ly) {
	text(STR.ui.gather + " — " + (st.board[st.pos].cor ? STR.biomes[st.board[st.pos].b].c : STR.biomes[st.board[st.pos].b].n), Ly.gatherX + 2, Ly.gatherY - 20, 14, COL.parchDim);
	const list = L.gatherList(st);
	list.forEach((g, i) => {
		const x = Ly.gatherX + i * (Ly.gcW + 8);
		const reason = L.gatherBlockReason(st, g);
		const blocked = reason ? (STR.errors[reason] || STR.errors.invalid) : null;
		drawCard(g, x, Ly.gatherY, Ly.gcW, Ly.gcH, blocked, () => doAction({ type: "gather", card: g }), "1×/" + STR.ui.day.toLowerCase());
	});
}

function drawHand(Ly) {
	text(STR.ui.hand + " (" + st.hand.length + ")  ·  " + STR.ui.moveHint, Ly.handX + 2, Ly.handY - 20, 14, COL.parchDim);
	const n = st.hand.length;
	// Shrink cards when a big hand would not fit its row(s).
	const cols = portrait ? Math.max(Ly.handCols, Math.ceil(n / 2)) : Math.max(n, 1);
	const availW = portrait ? 704 : (Ly.endX - Ly.handX - 16);
	const cw = Math.min(Ly.hcW, Math.floor((availW - 8 * (cols - 1)) / Math.max(cols, 1)));
	st.hand.forEach((id, i) => {
		const colI = i % cols, rowI = Math.floor(i / cols);
		const x = Ly.handX + colI * (cw + 8);
		const y = Ly.handY + rowI * (Ly.hcH + 8);
		const reason = L.cardBlockReason(st, id);
		const blocked = reason ? (STR.errors[reason] || STR.errors.invalid) : null;
		drawCard(id, x, y, cw, Ly.hcH, blocked, () => doAction({ type: "play", index: i }));
	});
	rect(Ly.endX, Ly.endY, Ly.endW, Ly.endH, "#3a2a20", COL.amber);
	text(STR.ui.endDay, Ly.endX + Ly.endW / 2, Ly.endY + Ly.endH / 2 - 12, portrait ? 20 : 18, COL.parchment, "center");
	hit(Ly.endX, Ly.endY, Ly.endW, Ly.endH, () => doAction({ type: "endDay" }));
}

function drawOverlays() {
	if (!overlay) return;
	rect(0, 0, VW, VH, "rgba(5,7,10,0.7)");
	hit(0, 0, VW, VH, () => {}); // swallow clicks under the overlay
	const cx = VW / 2;
	if (overlay === "bum") {
		img("bum", 0, VH / 2 - (VW * 9 / 16) / 2, VW, VW * 9 / 16);
		text(STR.ui.bumTitle, cx, VH * 0.12, 84, COL.acid, "center");
		STR.ui.bumText.split("\n").forEach((s, i) => text(s, cx, VH * 0.74 + i * 26, 18, COL.parchment, "center"));
		const bw = 240, bh = 60, bx = cx - bw / 2, by = VH * 0.86;
		rect(bx, by, bw, bh, "#2c3a28", COL.acid);
		text(STR.ui.bumContinue, cx, by + 16, 22, COL.parchment, "center");
		hit(bx, by, bw, bh, () => { overlay = null; syncOverlays(); if (st.over) screen = "end"; });
	} else if (overlay === "reward") {
		const pw = Math.min(640, VW - 40), ph = 280, px = cx - pw / 2, py = VH / 2 - ph / 2;
		rect(px, py, pw, ph, COL.panel, COL.amber);
		const queued = st.pending > 1 ? "  (" + STR.ui.queued + ": " + st.pending + ")" : "";
		text(STR.ui.levelUpTitle + " " + st.level + " — " + STR.ui.chooseReward + queued, cx, py + 18, 19, COL.parchment, "center");
		const opts = [
			[STR.ui.rewardEnergy, () => doAction({ type: "reward", kind: "energy" })],
			[STR.ui.rewardHealth, () => doAction({ type: "reward", kind: "health" })],
			[STR.ui.rewardCard, () => doAction({ type: "reward", kind: "card" })],
		];
		const bw = (pw - 64) / 3, bh = 150, by = py + 80;
		opts.forEach(([lab, fn], i) => {
			const bx = px + 16 + i * (bw + 16);
			rect(bx, by, bw, bh, "#22302a", COL.acid);
			lab.split("\n").forEach((s, li) => text(s, bx + bw / 2, by + 44 + li * 24, 16, COL.parchment, "center"));
			hit(bx, by, bw, bh, fn);
		});
	} else if (overlay === "pick") {
		const pw = Math.min(660, VW - 24), ph = 300, px = cx - pw / 2, py = VH / 2 - ph / 2;
		rect(px, py, pw, ph, COL.panel, COL.amber);
		text(STR.ui.pickCard, cx, py + 14, 19, COL.parchment, "center");
		const cw = (pw - 64) / 3, ch = 200, cy2 = py + 60;
		(st.cardChoices || []).forEach((id, i) => {
			const x = px + 16 + i * (cw + 16);
			drawCard(id, x, cy2, cw, ch, null, () => doAction({ type: "pickCard", card: id }));
		});
	} else if (overlay === "tile") {
		const tile = st.board[st.pos];
		const pw = Math.min(620, VW - 24), ph = 116 + tile.blds.length * 64, px = cx - pw / 2, py = VH / 2 - ph / 2;
		rect(px, py, pw, ph, COL.panel, COL.amber);
		text(STR.ui.buildingMenu, cx, py + 12, 18, COL.parchment, "center");
		tile.blds.forEach((b, bi) => {
			const ry = py + 50 + bi * 64;
			rect(px + 12, ry, pw - 24, 56, "#161c16", b.ruin ? COL.red : COL.green);
			const status = b.ruin ? STR.ui.ruin : (b.hp < b.maxHp ? STR.ui.damaged : "OK");
			text(cardName(b.id) + "  " + b.hp + "/" + b.maxHp + "♥  " + status, px + 24, ry + 18, 15, COL.parchment);
			if (b.ruin) {
				const bw2 = 130, bx2 = px + pw - 24 - bw2;
				rect(bx2, ry + 8, bw2, 40, "#3a2a20", COL.amber);
				text(STR.ui.dismantle + " ⚡1", bx2 + bw2 / 2, ry + 18, 14, COL.parchment, "center");
				hit(bx2, ry + 8, bw2, 40, () => doAction({ type: "dismantle", tile: st.pos, slot: bi }));
			} else if (b.hp < b.maxHp) {
				const bw2 = 170, bx2 = px + pw - 24 - bw2;
				rect(bx2, ry + 8, bw2, 40, "#3a2a20", COL.amber);
				text(STR.ui.repair + " ⚡2 🪵" + L.repairWoodCost(b), bx2 + bw2 / 2, ry + 18, 14, COL.parchment, "center");
				hit(bx2, ry + 8, bw2, 40, () => doAction({ type: "repair", tile: st.pos, slot: bi }));
			}
		});
		const bw3 = 160, by3 = py + ph - 52;
		rect(cx - bw3 / 2, by3, bw3, 44, "#2a2a30", COL.parchDim);
		text(STR.ui.close, cx, by3 + 12, 16, COL.parchment, "center");
		hit(cx - bw3 / 2, by3, bw3, 44, () => { overlay = null; });
	}
}

function drawPlay() {
	const Ly = layout();
	img("bg", 0, 0, VW, VH);
	rect(0, 0, VW, VH, "rgba(10,12,16,0.55)");
	drawTop(Ly);
	drawBoard(Ly);
	drawLog(Ly);
	drawGather(Ly);
	drawHand(Ly);
	if (toastT > 0 && toast) {
		const tw = Math.min(520, VW - 40);
		rect(VW / 2 - tw / 2, VH * 0.45, tw, 44, "rgba(60,20,20,0.95)", COL.red);
		text(toast, VW / 2, VH * 0.45 + 12, 16, COL.parchment, "center");
	}
	drawOverlays();
}

// --- fixed-timestep loop (turn-based: update only ticks timers) ---
const STEP = 1000 / 60;
let acc = 0, last = performance.now(), paused = false, frames = 0, fpsAt = last, fps = 0;
addEventListener("blur", () => paused = true);
addEventListener("focus", () => { paused = false; last = performance.now(); });
function update() {
	if (toastT > 0) toastT--;
	if (shakeT > 0) shakeT--;
}
const dev = new URLSearchParams(location.search).has("dev");
if (dev) document.getElementById("dev").style.display = "block";
function frame(now) {
	requestAnimationFrame(frame);
	if (paused) return;
	acc += now - last; last = now;
	while (acc >= STEP) { update(); acc -= STEP; }
	drawOps = 0;
	hits = [];
	ctx.fillStyle = COL.bgDark; ctx.fillRect(0, 0, innerWidth, innerHeight);
	ctx.save();
	let sx = 0, sy = 0;
	if (shakeT > 0) { sx = (Math.random() - 0.5) * 14; sy = (Math.random() - 0.5) * 14; }
	ctx.translate(offX + sx, offY + sy);
	ctx.scale(scaleF, scaleF);
	ctx.beginPath(); ctx.rect(0, 0, VW, VH); ctx.clip();
	if (assetsLeft > 0) text("...", VW / 2, VH / 2, 30, COL.parchDim, "center");
	else if (screen === "menu") drawMenu();
	else if (screen === "end") drawEnd();
	else drawPlay();
	ctx.restore();
	// hits are recorded in virtual space; pointer handler converts coords.
	if (dev && (frames++, now - fpsAt >= 500)) {
		fps = Math.round(frames * 1000 / (now - fpsAt)); frames = 0; fpsAt = now;
		document.getElementById("dev").textContent = fps + " fps · " + drawOps + " draw ops";
	}
}
requestAnimationFrame(frame);
</script>
